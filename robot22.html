<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPIKE コックピット</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1e24;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }
        /* 全画面のコンテナ */
        .container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }
        /* カメラ映像エリア（上がカメラ、下がコントローラー） */
        .video-stream {
            flex: 1;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .video-stream iframe, .video-stream video {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: cover;
        }
        .status-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            letter-spacing: 1px;
        }
        /* コントローラーエリア */
        .controller-panel {
            height: 280px;
            background: linear-gradient(to bottom, #2a2a35, #1c1c24);
            border-top: 2px solid #3a3a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        /* 十字キーの配置 */
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(3, 80px);
            gap: 10px;
        }
        .btn {
            background-color: #3a3a4a;
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px #22222a;
            cursor: pointer;
            transition: background-color 0.1s;
        }
        .btn:active {
            background-color: #5a5a70;
            transform: translateY(4px);
            box-shadow: none;
        }
        /* 空白部分 */
        .empty {
            visibility: hidden;
        }
        /* 停止ボタン（中央） */
        .btn-stop {
            background-color: #d9534f;
            box-shadow: 0 4px #962d2a;
            font-size: 16px;
        }
        .btn-stop:active {
            background-color: #c9302c;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="video-stream">
            <div class="status-bar" id="status">SPIKE: 待機中</div>
            <div style="color: #666;">【ここにカメラ映像が映ります】</div>
        </div>

        <div class="controller-panel">
            <div class="d-pad">
                <div class="empty"></div>
                <button class="btn" onmousedown="sendCommand('forward')" ontouchstart="sendCommand('forward')">▲</button>
                <div class="empty"></div>

                <button class="btn" onmousedown="sendCommand('left')" ontouchstart="sendCommand('left')">◀</button>
                <button class="btn btn-stop" onmousedown="sendCommand('stop')" ontouchstart="sendCommand('stop')">STOP</button>
                <button class="btn" onmousedown="sendCommand('right')" ontouchstart="sendCommand('right')">▶</button>

                <div class="empty"></div>
                <button class="btn" onmousedown="sendCommand('backward')" ontouchstart="sendCommand('backward')">▼</button>
                <div class="empty"></div>
            </div>
        </div>
    </div>

    <script>
        // SPIKEアプリ（Python）が待ち受けているローカルサーバーのアドレス
        // iPad内部で通信するため「localhost（127.0.0.1）」のポート8080番を狙います
        const SPIKE_URL = 'http://127.0.0.1:8080/';

        function sendCommand(direction) {
            document.getElementById('status').innerText = '命令送信: ' + direction;
            
            // fetchを使って、裏のSPIKEアプリへHTTPリクエスト（電波）を飛ばす
            fetch(SPIKE_URL + direction, {
                method: 'GET',
                mode: 'cors' // 異なるアプリ間での通信を許可する設定
            })
            .then(response => {
                document.getElementById('status').innerText = 'SPIKE: 受信OK (' + direction + ')';
            })
            .catch(error => {
                // まだ裏でPythonが動いていない時はエラーになります
                document.getElementById('status').innerText = 'SPIKE: 未接続';
                console.log('通信エラー:', error);
            });
        }

        // 指を離したときに自動で停止命令を送る（暴走防止）
        window.addEventListener('mouseup', () => sendCommand('stop'));
        window.addEventListener('touchend', () => sendCommand('stop'));
    </script>
</body>
</html>
