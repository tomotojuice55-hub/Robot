<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SPIKE Prime 接続テスト</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .btn { padding: 15px; font-size: 14pt; margin: 10px; border-radius: 8px; }
        .connect-btn { background-color: #ff3b30; color: white; width: 80%; font-size: 16pt; }
        .move-btn { background-color: #007aff; color: white; width: 100px; }
    </style>
</head>
<body>

    <h1>SPIKE Prime 接続テスト</h1>
    <p>iPadのBluefyアプリで試してください</p>

    <button class="btn connect-btn" id="connect">Bluetoothデバイスを探す</button>

    <br><br>

    <button class="btn move-btn" id="forward">前進</button><br>
    <button class="btn move-btn" id="left">左折</button>
    <button class="btn move-btn" id="stop" style="background-color:#ff3b30;">停止</button>
    <button class="btn move-btn" id="right">右折</button><br>
    <button class="btn move-btn" id="backward">後退</button>

    <script>
        const LEGO_HUB_SERVICE_UUID = '00001623-1212-efde-1523-785feabcd123'; 
        const LEGO_HUB_CHARACTERISTIC_UUID = '00001624-1212-efde-1523-785feabcd123';

        let spikeCharacteristic = null;

        // 初期版の接続処理をそのまま使用
        document.getElementById('connect').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [
                        LEGO_HUB_SERVICE_UUID,
                        '0000180a-0000-1000-8000-00805f9b34fb',
                        '0000180f-0000-1000-8000-00805f9b34fb'
                    ]
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(LEGO_HUB_SERVICE_UUID);
                spikeCharacteristic = await service.getCharacteristic(LEGO_HUB_CHARACTERISTIC_UUID);

                alert('接続成功！');
            } catch (error) {
                alert('エラー: ' + error.message);
            }
        });

        // 1つずつ確実に命令を送る処理
        document.getElementById('forward').addEventListener('click', async () => {
            if (!spikeCharacteristic) return;
            await spikeCharacteristic.writeValue(new TextEncoder().encode('FORWARD\n'));
        });

        document.getElementById('backward').addEventListener('click', async () => {
            if (!spikeCharacteristic) return;
            await spikeCharacteristic.writeValue(new TextEncoder().encode('BACKWARD\n'));
        });

        document.getElementById('left').addEventListener('click', async () => {
            if (!spikeCharacteristic) return;
            await spikeCharacteristic.writeValue(new TextEncoder().encode('LEFT\n'));
        });

        document.getElementById('right').addEventListener('click', async () => {
            if (!spikeCharacteristic) return;
            await spikeCharacteristic.writeValue(new TextEncoder().encode('RIGHT\n'));
        });

        document.getElementById('stop').addEventListener('click', async () => {
            if (!spikeCharacteristic) return;
            await spikeCharacteristic.writeValue(new TextEncoder().encode('STOP\n'));
        });
    </script>
</body>
</html>
