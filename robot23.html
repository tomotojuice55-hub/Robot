<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPIKE Prime 右下配置コクピット</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { font-family: Arial, sans-serif; text-align: center; background-color: #1e1e24; margin: 0; padding: 0; overflow: hidden; color: white; }
        
        /* 🎥 画面全体がカメラ映像エリア */
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #1e1e24;
        }
        #robot-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* 📺 映像が映る前の準備中アナウンス画面 */
        .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #2a2a35;
            z-index: 2;
            color: #aaa;
        }

        /* 🟢 ステータス表示（左上に浮かせる） */
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 11pt;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        /* ⚠️ 赤文字のエラーログ表示エリア */
        #error-log {
            position: absolute;
            top: 70px;
            left: 20px;
            color: #ff3b30;
            font-weight: bold;
            font-family: monospace;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            max-width: 300px;
            z-index: 10;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
        }

        /* 🕹️ 操縦パネル（画面の右下に固定して浮かせる！） */
        .overlay-panel {
            position: absolute;
            bottom: 30px; /* 画面下から30px */
            right: 20px;  /* 画面右から20px */
            z-index: 10;
        }
        
        /* 半透明の十字キーの枠組み（サイズを少しだけコンパクトにして片手で押しやすく） */
        .controller-grid {
            display: grid;
            grid-template-columns: repeat(3, 85px);
            grid-template-rows: repeat(3, 85px);
            gap: 12px;
            justify-content: center;
            background: rgba(255, 255, 255, 0.07);
            padding: 15px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 🔘 半透明ボタンのスタイル */
        .btn {
            font-size: 13pt;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.1s ease;
        }

        /* 移動ボタン（半透明ブルー） */
        .move-btn { 
            background-color: rgba(0, 122, 255, 0.35); 
            color: rgba(255, 255, 255, 0.9); 
            text-shadow: 0 0 5px rgba(0,122,255,1);
        }
        .move-btn:active { 
            background-color: rgba(0, 122, 255, 0.7); 
            transform: scale(0.92); 
        }

        /* 停止ボタン（半透明レッド） */
        .stop-btn { 
            background-color: rgba(255, 59, 48, 0.4); 
            color: white; 
            grid-column: 2; 
            grid-row: 2; 
            font-size: 10pt;
            border: 1px solid rgba(255, 59, 48, 0.5);
            text-shadow: 0 0 5px rgba(255,59,48,1);
        }
        .stop-btn:active { 
            background-color: rgba(255, 59, 48, 0.8); 
            transform: scale(0.92); 
        }
        
        /* ボタン無効化時 */
        button:disabled {
            background-color: rgba(200, 200, 200, 0.1) !important;
            color: rgba(255, 255, 255, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            cursor: not-allowed;
            text-shadow: none !important;
        }
        
        #forward { grid-column: 2; grid-row: 1; }
        #left { grid-column: 1; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
        #backward { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

    <div class="container">
        <div id="status">❌ 未接続</div>
        <div id="error-log"></div>

        <div class="video-placeholder" id="placeholder">
            <h2 style="color: white; margin-bottom: 5px;">🎥 CAMERA LIVE</h2>
            <p id="placeholder-text">iPhoneの配信（Larix）を開始してください...</p>
        </div>

        <video id="robot-video" autoplay playsinline muted></video>

        <div class="overlay-panel">
            <div class="controller-grid">
                <button class="btn move-btn" id="forward" ontouchstart="sendCmd('forward')" onmousedown="sendCmd('forward')" disabled>前進</button>
                <button class="btn move-btn" id="left" ontouchstart="sendCmd('left')" onmousedown="sendCmd('left')" disabled>左折</button>
                <button class="btn stop-btn" id="stop" ontouchstart="sendCmd('stop')" onmousedown="sendCmd('stop')" disabled>停止</button>
                <button class="btn move-btn" id="right" ontouchstart="sendCmd('right')" onmousedown="sendCmd('right')" disabled>右折</button>
                <button class="btn move-btn" id="backward" ontouchstart="sendCmd('backward')" onmousedown="sendCmd('backward')" disabled>後退</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@skyway-sdk/room@latest/dist/skyway_room.js"></script>

    <script>
        const errorLog = document.getElementById('error-log');
        const statusDiv = document.getElementById('status');
        const placeholder = document.getElementById('placeholder');

        // コード内エラー検知機能
        window.onerror = function(message, source, lineno) {
            errorLog.innerText = "⚠️ コード内のエラー: " + message + " (行: " + lineno + ")";
            return true;
        };

        // ==========================================
        // 🌐 1. SkyWay カメラ映像受信設定
        // ==========================================
        const { SkyWayContext, SkyWayRoom } = SkyWayRoomAuth;

        async function startCameraReceive() {
            errorLog.innerText = "SkyWayに接続中...";
            try {
                // ★ここにあなたのSkyWayのApp ID（APIキー）を貼り付けます
                const appId = '★あなたのSkyWayのApp ID★'; 
                
                const context = await SkyWayContext.Create({ token: appId });
                const room = await SkyWayRoom.FindOrCreate(context, {
                    name: 'spike_room',
                    type: 'p2p'
                });
                const me = await room.join();

                statusDiv.innerText = '🔍 iPhoneの配信を待っています...';
                statusDiv.style.color = '#ffcc00';
                errorLog.innerText = ""; 

                room.onStreamPublished.add(async (e) => {
                    if (e.stream.peerId.includes('iphone_stream')) {
                        const { stream } = await me.subscribe(e.stream.id);
                        const videoElement = document.getElementById('robot-video');
                        stream.attach(videoElement);
                        
                        placeholder.style.display = 'none';
                        statusDiv.innerText = '🟢 コクピット同期完了！';
                        statusDiv.style.color = '#34c759';
                        
                        document.querySelectorAll('.btn').forEach(btn => btn.disabled = false);
                    }
                });
            } catch (err) {
                errorLog.innerText = "❌ SkyWayエラー: " + err.message;
            }
        }

        // ==========================================
        // 🕹️ 2. 裏のSPIKEアプリへの命令送信設定
        // ==========================================
        const SPIKE_URL = 'http://127.0.0.1:8080/';

        function sendCmd(direction) {
            fetch(SPIKE_URL + direction, { mode: 'cors' })
            .catch(err => {
                console.log('SPIKE未接続');
            });
        }

        window.addEventListener('mouseup', () => sendCmd('stop'));
        window.addEventListener('touchend', () => sendCmd('stop'));

        window.onload = () => {
            startCameraReceive();
        };
    </script>
</body>
</html>
