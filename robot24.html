<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPIKE Prime シリアルコクピット</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { font-family: Arial, sans-serif; text-align: center; background-color: #1e1e24; margin: 0; padding: 0; overflow: hidden; color: white; }
        
        /* 🎥 画面全体がカメラ映像エリア */
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #1e1e24;
        }
        
        /* iframeでVDO.Ninjaの映像を全画面表示 */
        #robot-video {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 🟢 ステータス表示（左上に浮かせる） */
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 11pt;
            z-index: 10;
            backdrop-filter: blur(5px);
            cursor: pointer; /* タップして接続できるようにする */
        }

        /* ⚠️ 赤文字のエラーログ表示エリア */
        #error-log {
            position: absolute;
            top: 70px;
            left: 20px;
            color: #ff3b30;
            font-weight: bold;
            font-family: monospace;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            max-width: 300px;
            z-index: 10;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
        }

        /* 🕹️ 操縦パネル（画面の右下に固定） */
        .overlay-panel {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 10;
        }
        
        /* 半透明の十字キーの枠組み */
        .controller-grid {
            display: grid;
            grid-template-columns: repeat(3, 85px);
            grid-template-rows: repeat(3, 85px);
            gap: 12px;
            justify-content: center;
            background: rgba(255, 255, 255, 0.07);
            padding: 15px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 🔘 半透明ボタン */
        .btn {
            font-size: 13pt;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.1s ease;
        }

        .move-btn { 
            background-color: rgba(0, 122, 255, 0.35); 
            color: rgba(255, 255, 255, 0.9); 
            text-shadow: 0 0 5px rgba(0,122,255,1);
        }
        .move-btn:active { 
            background-color: rgba(0, 122, 255, 0.7); 
            transform: scale(0.92); 
        }

        .stop-btn { 
            background-color: rgba(255, 59, 48, 0.4); 
            color: white; 
            grid-column: 2; 
            grid-row: 2; 
            font-size: 10pt;
            border: 1px solid rgba(255, 59, 48, 0.5);
            text-shadow: 0 0 5px rgba(255,59,48,1);
        }
        .stop-btn:active { 
            background-color: rgba(255, 59, 48, 0.8); 
            transform: scale(0.92); 
        }
        
        #forward { grid-column: 2; grid-row: 1; }
        #left { grid-column: 1; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
        #backward { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

    <div class="container">
        <div id="status" onclick="connectSerial()">🔗 タップしてSPIKEと接続</div>
        <div id="error-log"></div>

        <iframe id="robot-video" src="https://vdo.ninja/?view=LRGfYki&autoplay&transparent&clean" allow="autoplay; camera"></iframe>

        <div class="overlay-panel">
            <div class="controller-grid">
                <button class="btn move-btn" id="forward" ontouchstart="sendCmd('forward')" onmousedown="sendCmd('forward')">前進</button>
                <button class="btn move-btn" id="left" ontouchstart="sendCmd('left')" onmousedown="sendCmd('left')">左折</button>
                <button class="btn stop-btn" id="stop" ontouchstart="sendCmd('stop')" onmousedown="sendCmd('stop')">停止</button>
                <button class="btn move-btn" id="right" ontouchstart="sendCmd('right')" onmousedown="sendCmd('right')">右折</button>
                <button class="btn move-btn" id="backward" ontouchstart="sendCmd('backward')" onmousedown="sendCmd('backward')">後退</button>
            </div>
        </div>
    </div>

    <script>
        const errorLog = document.getElementById('error-log');
        const statusDiv = document.getElementById('status');
        let port = null;
        let writer = null;

        window.onerror = function(message, source, lineno) {
            errorLog.innerText = "⚠️ コード内のエラー: " + message + " (行: " + lineno + ")";
            return true;
        };

        // ==========================================
        // 🔌 SPIKEハブとシリアル(Bluetooth/USB)接続する機能
        // ==========================================
        async function connectSerial() {
            try {
                if (!navigator.serial) {
                    errorLog.innerText = "⚠️ このブラウザはシリアル通信に対応していません。iPadのSafari、またはGoogle Chromeを使用してください。";
                    return;
                }
                statusDiv.innerText = "接続中...";
                
                // ペアリング画面を開く
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 }); // SPIKE標準の通信速度
                
                const encoder = new TextEncoderStream();
                encoder.readable.pipeTo(port.writable);
                writer = encoder.writable.getWriter();
                
                statusDiv.innerText = "🟢 SPIKEとダイレクト接続中";
                statusDiv.style.color = "#34c759";
                errorLog.innerText = "";
            } catch (err) {
                statusDiv.innerText = "🔗 タップしてSPIKEと接続";
                errorLog.innerText = "❌ 接続エラー: " + err.message;
            }
        }

        // ==========================================
        // 🕹️ ボタンが押されたらシリアル経由で文字を送る
        // ==========================================
        async function sendCmd(direction) {
            if (!writer) {
                console.log("SPIKEにまだ接続されていません。左上のボタンを押してください。");
                return;
            }
            try {
                // Pythonのsys.stdin.readline()が反応するように、末尾に改行（\n）をつけて送る
                await writer.write(direction + "\n");
            } catch (err) {
                console.error("送信エラー:", err);
            }
        }

        // 指を離したら自動でストップ
        window.addEventListener('mouseup', () => sendCmd('stop'));
        window.addEventListener('touchend', () => sendCmd('stop'));
    </script>
</body>
</html>
